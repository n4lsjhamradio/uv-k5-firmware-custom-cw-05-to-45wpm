on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    container:
      image: archlinux:latest
    steps:
      - name: base-devel
        run:  pacman -Syyu base-devel --noconfirm
      - name: arm-none-eabi-gcc
        run:  pacman -Syyu arm-none-eabi-gcc --noconfirm
      - name: arm-none-eabi-newlib
        run:  pacman -Syyu arm-none-eabi-newlib --noconfirm
      - name: git
        run:  pacman -Syyu git --noconfirm
      - name: python-pip
        run:  pacman -Syyu python-pip --noconfirm
      - name: python-crcmod
        run:  pacman -Syyu python-crcmod --noconfirm      

      - name: Checkout
        uses: actions/checkout@v4
        
      - name: safe.directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Make
        run:  make
      - name: size
        run:  arm-none-eabi-size firmware

      - name: 'Upload Artifact'
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: firmware*.bin

      - name: Set release tag name
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: echo "RELEASE_TAG=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Upload binaries to release
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: firmware.packed.bin
          asset_name: nr7y_${{ env.RELEASE_TAG }}.packed.bin
          tag: ${{ github.ref }}
          overwrite: true
          release_name: release ${{ env.RELEASE_TAG }}

      - name: Upload firmware README to release
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: NR7Y_FIRMWARE_README.md
          asset_name: NR7Y_FIRMWARE_README.md
          tag: ${{ github.ref }}
          overwrite: true
          release_name: release ${{ env.RELEASE_TAG }}

      - name: Upload CHIRP module to release
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: chirp/uvk5_NR7Y.py
          asset_name: uvk5_NR7Y.py
          tag: ${{ github.ref }}
          overwrite: true
          release_name: release ${{ env.RELEASE_TAG }}

      - name: Build B15 ring firmware
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: |
          make clean
          make EXTRA_CFLAGS="-DUSE_B15_FOR_RING"

      - name: 'Upload B15 Artifact'
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: firmware_ring_b15
          path: firmware*.bin

      - name: Upload B15 firmware to release
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: firmware.packed.bin
          asset_name: nr7y_ring_b15_${{ env.RELEASE_TAG }}.packed.bin
          tag: ${{ github.ref }}
          overwrite: true
          release_name: release ${{ env.RELEASE_TAG }}

